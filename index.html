<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>LatentPulse · Specimen Console</title>
<link rel="icon" type="image/svg+xml" href="app/latentpulse/baseline/favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink:      #14171A;   /* app background */
    --raised:   #1C2024;   /* rail + meta surface */
    --hairline: #2A2F35;   /* dividers + iframe frame */
    --text:     #E8EAED;
    --muted:    #8A929B;
    --signal:   #047857;   /* Pulse Green — active dot + active-tab marker ONLY */

    --tab-active-bg: rgba(255, 255, 255, 0.035);
    --tab-hover-bg:  rgba(255, 255, 255, 0.02);

    --font-display: 'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace;
    --font-sans:    system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

    --rail-w: 260px;
    --gutter: 30px;       /* dot column width inside the rail */
    --dot: 9px;
    --radius: 8px;
    --dur: 160ms;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    display: flex;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ============================================================= RAIL */
  .rail {
    flex: 0 0 var(--rail-w);
    width: var(--rail-w);
    background: var(--raised);
    border-right: 1px solid var(--hairline);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .brand {
    position: relative;
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--hairline);
  }
  .wordmark {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1;
  }
  .eyebrow {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ---- app switcher: the rail-top app tier; opens a menu of apps ---- */
  .app-switch {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin: 0;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    cursor: pointer;
    border-radius: 6px;
  }
  .app-switch:focus-visible { outline: 2px solid var(--signal); outline-offset: 3px; }
  .app-chev {
    width: 11px;
    height: 11px;
    flex: 0 0 auto;
    color: var(--muted);
    transition: transform var(--dur) ease, color var(--dur) ease;
  }
  .app-switch:hover .app-chev { color: var(--text); }
  .app-switch[aria-expanded="true"] .app-chev { transform: rotate(180deg); color: var(--text); }

  .app-menu {
    position: absolute;
    top: calc(100% - 1px);
    left: 14px;
    right: 14px;
    z-index: 20;
    margin: 0;
    padding: 5px;
    list-style: none;
    background: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
  }
  .app-menu[hidden] { display: none; }
  .app-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    border: 0;
    background: transparent;
    cursor: pointer;
    text-align: left;
    padding: 8px 9px;
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 13.5px;
    letter-spacing: -0.005em;
    transition: background var(--dur) ease;
  }
  .app-item:hover { background: var(--tab-hover-bg); }
  .app-item:focus-visible { outline: 2px solid var(--signal); outline-offset: -2px; }
  .app-check {
    flex: 0 0 14px;
    width: 14px;
    color: var(--signal);
    opacity: 0;
  }
  .app-item[aria-checked="true"] .app-check { opacity: 1; }

  /* ---- specimen tablist + version spine ---- */
  .specimens {
    position: relative;
    padding: 14px 0 14px 0;
    overflow-y: auto;
    min-height: 0;
  }

  .tab {
    position: relative;
    display: flex;
    align-items: center;
    width: 100%;
    border: 0;
    background: transparent;
    cursor: pointer;
    text-align: left;
    padding: 13px 18px 13px 0;
    color: var(--text);
    transition: background var(--dur) ease;
  }
  .tab:hover { background: var(--tab-hover-bg); }

  /* active-tab marker: thin Pulse-Green bar at the rail edge */
  .tab[aria-selected="true"] {
    background: var(--tab-active-bg);
    box-shadow: inset 2px 0 0 0 var(--signal);
  }

  .tab:focus-visible {
    outline: 2px solid var(--signal);
    outline-offset: -2px;
  }

  /* dot column — holds the spine line + the version dot */
  .dot-col {
    position: relative;
    flex: 0 0 var(--gutter);
    align-self: stretch;
  }
  /* the spine: a continuous vertical ladder behind the dots */
  .dot-col::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    transform: translateX(-0.5px);
    background: var(--hairline);
  }
  .tab:first-child .dot-col::before { top: 50%; }
  .tab:last-child  .dot-col::before { bottom: 50%; }

  .dot {
    position: absolute;
    left: 50%;
    top: 50%;
    width: var(--dot);
    height: var(--dot);
    margin: calc(var(--dot) / -2);
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.55;
    box-shadow: 0 0 0 4px var(--raised);   /* punch through the spine line */
    transition: background var(--dur) ease, opacity var(--dur) ease, box-shadow var(--dur) ease;
  }
  .tab[aria-selected="true"] .dot {
    background: var(--signal);
    opacity: 1;
    box-shadow: 0 0 0 4px var(--raised), 0 0 0 6px rgba(4, 120, 87, 0.28);
  }

  .tab-body {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .tab-label {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 13.5px;
    letter-spacing: -0.005em;
    color: var(--text);
    word-break: break-word;
  }
  .tab[aria-selected="false"] .tab-label { color: var(--muted); }
  .tab-version {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--muted);
  }

  /* ============================================================= STAGE */
  .stage {
    flex: 1 1 auto;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--ink);
  }

  .meta {
    flex: 0 0 auto;
    background: var(--raised);
    border-bottom: 1px solid var(--hairline);
    padding: 14px 22px 15px;
  }
  .meta-keys {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.4;
  }
  .meta-pair { white-space: nowrap; }
  .meta-k {
    color: var(--muted);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    margin-right: 6px;
  }
  .meta-v { color: var(--text); font-weight: 500; }
  .meta-sep { color: var(--hairline); }
  .meta-desc {
    margin-top: 9px;
    font-family: var(--font-sans);
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--muted);
    max-width: 92ch;
  }

  .frames {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    padding: 20px;
  }
  .frame {
    flex: 1 1 auto;
    min-height: 0;
    display: none;
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--ink);
    animation: frame-in var(--dur) ease both;
  }
  .frame.is-active { display: flex; }
  .frame > iframe {
    flex: 1 1 auto;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  @keyframes frame-in { from { opacity: 0; } to { opacity: 1; } }

  /* ---- viewport toggle (Desktop | Mobile) ---- */
  .meta-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .viewport-toggle {
    flex: 0 0 auto;
    display: inline-flex;
    gap: 2px;
    padding: 2px;
    background: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: 7px;
  }
  .vp-btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: -0.005em;
    padding: 5px 13px;
    border-radius: 5px;
    transition: background var(--dur) ease, color var(--dur) ease, box-shadow var(--dur) ease;
  }
  .vp-btn:hover { color: var(--text); }
  .vp-btn[aria-pressed="true"] {
    background: var(--tab-active-bg);
    color: var(--text);
    box-shadow: inset 0 0 0 1px var(--hairline);
  }
  .vp-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 1px; }

  /* mobile viewport: clamp the active frame to phone width, centered on the
     graphite. An iframe is its own viewport, so narrowing it makes each
     prototype's OWN responsive code reflow to mobile — prototypes untouched. */
  .frames.vp-mobile { justify-content: center; }
  .frames.vp-mobile .frame {
    flex: 0 0 min(390px, 100%);
    max-width: 390px;
    margin-inline: auto;
  }

  /* ============================================================= RESPONSIVE */
  @media (max-width: 640px) {
    body { flex-direction: column; }
    .rail {
      flex: 0 0 auto;
      width: 100%;
      border-right: 0;
      border-bottom: 1px solid var(--hairline);
    }
    .brand { padding: 16px 18px 14px; }

    .specimens {
      display: flex;
      flex-direction: row;
      padding: 0;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .tab {
      flex: 0 0 auto;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 18px 13px;
      min-width: 150px;
    }
    .tab[aria-selected="true"] {
      box-shadow: inset 0 -2px 0 0 var(--signal);   /* marker moves to the bottom edge */
    }
    /* spine goes horizontal across the top strip */
    .dot-col {
      flex: 0 0 auto;
      align-self: auto;
      width: var(--dot);
      height: var(--dot);
    }
    .dot-col::before {
      left: 50%;
      right: auto;
      top: 50%;
      bottom: auto;
      width: 100vw;
      height: 1px;
      transform: translateY(-0.5px);
    }
    .tab:first-child .dot-col::before { left: 50%; }
    .tab:last-child  .dot-col::before { left: auto; right: 50%; }
    .dot { box-shadow: 0 0 0 4px var(--raised); }
    .tab[aria-selected="true"] .dot {
      box-shadow: 0 0 0 4px var(--raised), 0 0 0 6px rgba(4, 120, 87, 0.28);
    }
    .frames { padding: 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
  <aside class="rail">
    <div class="brand">
      <!-- app tier: the app switcher. Wordmark = active app (data-driven);
           the menu lists apps; the version tabs below are this app's specimens. -->
      <button type="button" class="app-switch" id="app-switch" aria-haspopup="menu" aria-expanded="false" aria-controls="app-menu">
        <span class="wordmark" id="app-name">LatentPulse</span>
        <svg class="app-chev" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 4.5 6 7.5 9 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="eyebrow">prototype console</div>
      <ul class="app-menu" id="app-menu" role="menu" aria-label="Apps" hidden></ul>
    </div>
    <nav class="specimens" role="tablist" aria-labelledby="app-name" aria-orientation="vertical"></nav>
  </aside>

  <main class="stage">
    <header class="meta">
      <div class="meta-top">
        <div class="meta-keys">
          <span class="meta-pair"><span class="meta-k">VERSION</span><span class="meta-v" id="m-version"></span></span>
          <span class="meta-sep" aria-hidden="true">·</span>
          <span class="meta-pair"><span class="meta-k">SLUG</span><span class="meta-v" id="m-slug"></span></span>
          <span class="meta-sep" aria-hidden="true">·</span>
          <span class="meta-pair"><span class="meta-k">TICKET</span><span class="meta-v" id="m-ticket"></span></span>
        </div>
        <div class="viewport-toggle" role="group" aria-label="Viewport width">
          <button type="button" class="vp-btn" id="vp-desktop" aria-pressed="true">Desktop</button>
          <button type="button" class="vp-btn" id="vp-mobile" aria-pressed="false">Mobile</button>
        </div>
      </div>
      <p class="meta-desc" id="m-desc"></p>
    </header>
    <div class="frames" id="frames"></div>
  </main>

<script>
  'use strict';

  // Single source of truth — app-keyed so a second app is a clean data addition.
  // Each app carries its label (the rail-top app node) + its ordered specimens.
  // Specimen order = version order = tab order. Default active = first (baseline).
  var APPS = {
    latentpulse: {
      label: 'LatentPulse',
      specimens: [
        {
          slug: 'baseline',
          version: 'v0.2.1',
          ticket: 'LM-239',
          desc: 'The baseline prototype in the project spec space — the current accepted alpha UI the two deltas build on (Claude Design v0.2.1, retrieved 2026-06-11).'
        },
        {
          slug: 'lm-298-ux-consolidation',
          version: 'v0.2.2',
          ticket: 'LM-298',
          desc: 'UX consolidation: account control to rail foot, top bar becomes the space header, one unified empty state, create→fund gains exit/back controls.'
        },
        {
          slug: 'lm-270-mobile-width',
          version: 'v0.2.3',
          ticket: 'LM-270',
          desc: 'Mobile-width pass: one shared content width, single rail toggle, slide+scrim motion, ≥44px tap targets, ≥16px inputs (kills iOS focus zoom).'
        }
      ]
    }
  };

  // Active app + its specimens are owned by renderApp() — re-runnable so the
  // app switcher can repoint to another app (data-driven; one app today).
  var ACTIVE_APP, APP, SPECIMENS;

  function srcFor(app, slug) {
    // URL-encode the space in the filename so the http server resolves it.
    return 'app/' + app + '/' + slug + '/LatentPulse%20Alpha.html';
  }

  var tablist = document.querySelector('.specimens');
  var framesEl = document.getElementById('frames');
  var appNameEl = document.getElementById('app-name');
  var meta = {
    version: document.getElementById('m-version'),
    slug: document.getElementById('m-slug'),
    ticket: document.getElementById('m-ticket'),
    desc: document.getElementById('m-desc')
  };

  var tabs = [];
  var frames = [];
  var activeIndex = 0;
  var focusIndex = 0;

  // Build (or rebuild) the version tabs + frames for the active app's specimens.
  function buildSpecimens() {
    tablist.innerHTML = '';
    framesEl.innerHTML = '';
    tabs.length = 0;
    frames.length = 0;

    SPECIMENS.forEach(function (spec, i) {
      var tab = document.createElement('button');
      tab.className = 'tab';
      tab.type = 'button';
      tab.id = 'tab-' + spec.slug;
      tab.setAttribute('role', 'tab');
      tab.setAttribute('aria-controls', 'panel-' + spec.slug);
      tab.setAttribute('aria-selected', 'false');
      tab.tabIndex = -1;
      tab.innerHTML =
        '<span class="dot-col" aria-hidden="true"><span class="dot"></span></span>' +
        '<span class="tab-body">' +
          '<span class="tab-label">' + spec.slug + '</span>' +
          '<span class="tab-version">' + spec.version + '</span>' +
        '</span>';

      tab.addEventListener('click', function () { activate(i, true); });
      tab.addEventListener('focus', function () { focusIndex = i; });
      tablist.appendChild(tab);
      tabs.push(tab);

      var frame = document.createElement('div');
      frame.className = 'frame';
      frame.id = 'panel-' + spec.slug;
      frame.setAttribute('role', 'tabpanel');
      frame.setAttribute('aria-labelledby', tab.id);

      var iframe = document.createElement('iframe');
      iframe.title = spec.slug + ' (' + spec.version + ')';
      iframe.loading = 'lazy';
      // No sandbox attribute: trusted local content, and a bare sandbox would
      // break the same-origin XHR babel-standalone uses to fetch app/*.jsx.
      frame.appendChild(iframe);
      framesEl.appendChild(frame);
      frames.push({ wrap: frame, iframe: iframe, loaded: false });
    });
  }

  function activate(i, moveFocus) {
    activeIndex = i;
    SPECIMENS.forEach(function (spec, j) {
      var selected = j === i;
      tabs[j].setAttribute('aria-selected', selected ? 'true' : 'false');
      tabs[j].tabIndex = selected ? 0 : -1;
      frames[j].wrap.classList.toggle('is-active', selected);
      if (selected && !frames[j].loaded) {
        frames[j].iframe.src = srcFor(ACTIVE_APP, spec.slug);   // lazy: set src on first activation
        frames[j].loaded = true;
      }
    });
    var spec = SPECIMENS[i];
    meta.version.textContent = spec.version;
    meta.slug.textContent = spec.slug;
    meta.ticket.textContent = spec.ticket;
    meta.desc.textContent = spec.desc;
    if (moveFocus) tabs[i].focus();
  }

  // Render an app: set it active, label the rail node, (re)build its specimens.
  function renderApp(appKey) {
    ACTIVE_APP = appKey;
    APP = APPS[appKey];
    SPECIMENS = APP.specimens;
    appNameEl.textContent = APP.label;
    activeIndex = 0;
    focusIndex = 0;
    buildSpecimens();
    activate(0, false);
    updateAppMenu();
  }

  // Keyboard: arrows move focus among version tabs (roving tabindex); Enter/Space activates.
  function moveFocus(next) {
    var n = tabs.length;
    focusIndex = (next + n) % n;
    tabs.forEach(function (t, j) { t.tabIndex = j === focusIndex ? 0 : -1; });
    tabs[focusIndex].focus();
  }

  tablist.addEventListener('keydown', function (e) {
    switch (e.key) {
      case 'ArrowDown':
      case 'ArrowRight':
        e.preventDefault();
        moveFocus(focusIndex + 1);
        break;
      case 'ArrowUp':
      case 'ArrowLeft':
        e.preventDefault();
        moveFocus(focusIndex - 1);
        break;
      case 'Home':
        e.preventDefault();
        moveFocus(0);
        break;
      case 'End':
        e.preventDefault();
        moveFocus(tabs.length - 1);
        break;
      case 'Enter':
      case ' ':
      case 'Spacebar':
        e.preventDefault();
        activate(focusIndex, true);
        break;
    }
  });

  // ---- app switcher: the rail-top app node opens a menu of apps ----
  var appSwitch = document.getElementById('app-switch');
  var appMenu = document.getElementById('app-menu');

  function buildAppMenu() {
    appMenu.innerHTML = '';
    Object.keys(APPS).forEach(function (key) {
      var li = document.createElement('li');
      li.setAttribute('role', 'none');
      var item = document.createElement('button');
      item.type = 'button';
      item.className = 'app-item';
      item.setAttribute('role', 'menuitemradio');
      item.setAttribute('aria-checked', 'false');
      item.dataset.app = key;
      item.innerHTML =
        '<span class="app-check" aria-hidden="true">✓</span>' +
        '<span>' + APPS[key].label + '</span>';
      item.addEventListener('click', function () {
        closeAppMenu();
        if (key !== ACTIVE_APP) renderApp(key);
        appSwitch.focus();
      });
      li.appendChild(item);
      appMenu.appendChild(li);
    });
  }

  function updateAppMenu() {
    appMenu.querySelectorAll('.app-item').forEach(function (it) {
      it.setAttribute('aria-checked', it.dataset.app === ACTIVE_APP ? 'true' : 'false');
    });
  }

  function onOutside(e) {
    if (e.target !== appSwitch && !appSwitch.contains(e.target) && !appMenu.contains(e.target)) {
      closeAppMenu();
    }
  }
  function onMenuKey(e) {
    if (e.key === 'Escape') { closeAppMenu(); appSwitch.focus(); }
  }
  function openAppMenu() {
    appMenu.hidden = false;
    appSwitch.setAttribute('aria-expanded', 'true');
    document.addEventListener('mousedown', onOutside, true);
    document.addEventListener('keydown', onMenuKey, true);
  }
  function closeAppMenu() {
    appMenu.hidden = true;
    appSwitch.setAttribute('aria-expanded', 'false');
    document.removeEventListener('mousedown', onOutside, true);
    document.removeEventListener('keydown', onMenuKey, true);
  }
  appSwitch.addEventListener('click', function () {
    if (appMenu.hidden) openAppMenu(); else closeAppMenu();
  });

  // Viewport toggle: Desktop fills the stage; Mobile clamps the active frame to
  // phone width so each prototype's own responsive layout reflows. Global state —
  // persists across tab switches.
  var vpDesktop = document.getElementById('vp-desktop');
  var vpMobile = document.getElementById('vp-mobile');
  function setViewport(isMobile) {
    framesEl.classList.toggle('vp-mobile', isMobile);
    vpMobile.setAttribute('aria-pressed', isMobile ? 'true' : 'false');
    vpDesktop.setAttribute('aria-pressed', isMobile ? 'false' : 'true');
  }
  vpDesktop.addEventListener('click', function () { setViewport(false); });
  vpMobile.addEventListener('click', function () { setViewport(true); });

  // ---- boot ----
  buildAppMenu();
  renderApp(Object.keys(APPS)[0]);
</script>
</body>
</html>
