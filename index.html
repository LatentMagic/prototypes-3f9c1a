<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Circlists · Prototype Console</title>
<!-- Favicon = the canonical Circlists mark, inlined so the console owns it (not
     borrowed from a shell-copied prototype dir that a re-export could change). -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Ccircle cx='24' cy='24' r='22.5' fill='%238bbfad'/%3E%3Ccircle cx='24' cy='24' r='14.25' fill='%23047857'/%3E%3Ccircle cx='24' cy='24' r='14.925' fill='none' stroke='%23ffffff' stroke-width='1.35'/%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink:      #14171A;   /* app background */
    --raised:   #1C2024;   /* rail + meta surface */
    --hairline: #2A2F35;   /* dividers + iframe frame */
    --text:     #E8EAED;
    --muted:    #8A929B;
    --signal:   #047857;   /* Pulse Green — active dot + active-tab marker ONLY */
    --brand:    #C99A2E;   /* Amber — the Branding node ONLY; marks it as reference, not a version */

    --tab-active-bg: rgba(255, 255, 255, 0.035);
    --tab-hover-bg:  rgba(255, 255, 255, 0.02);

    --font-display: 'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace;
    --font-sans:    system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

    --rail-w: 260px;
    --gutter: 30px;       /* dot column width inside the rail */
    --dot: 9px;
    --radius: 8px;
    --dur: 160ms;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    display: flex;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ============================================================= RAIL */
  .rail {
    flex: 0 0 var(--rail-w);
    width: var(--rail-w);
    background: var(--raised);
    border-right: 1px solid var(--hairline);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .brand {
    position: relative;
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--hairline);
  }
  .wordmark {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    /* text fallback styling, for any app that ships no lockup */
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1;
  }
  /* brand lockup: concentric mark + wordmark (wordmark inherits currentColor = --text) */
  .lockup-mark { width: 22px; height: 22px; flex: 0 0 auto; }
  .lockup-wm   { height: 15px; width: auto; flex: 0 0 auto; display: block; }
  .eyebrow {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ---- app switcher: the rail-top app tier; opens a menu of apps ---- */
  .app-switch {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin: 0;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    cursor: pointer;
    border-radius: 6px;
  }
  .app-switch:focus-visible { outline: 2px solid var(--signal); outline-offset: 3px; }
  .app-chev {
    width: 11px;
    height: 11px;
    flex: 0 0 auto;
    color: var(--muted);
    transition: transform var(--dur) ease, color var(--dur) ease;
  }
  .app-switch:hover .app-chev { color: var(--text); }
  .app-switch[aria-expanded="true"] .app-chev { transform: rotate(180deg); color: var(--text); }

  .app-menu {
    position: absolute;
    top: calc(100% - 1px);
    left: 14px;
    right: 14px;
    z-index: 20;
    margin: 0;
    padding: 5px;
    list-style: none;
    background: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
  }
  .app-menu[hidden] { display: none; }
  .app-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    border: 0;
    background: transparent;
    cursor: pointer;
    text-align: left;
    padding: 8px 9px;
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 13.5px;
    letter-spacing: -0.005em;
    transition: background var(--dur) ease;
  }
  .app-item:hover { background: var(--tab-hover-bg); }
  .app-item:focus-visible { outline: 2px solid var(--signal); outline-offset: -2px; }
  .app-check {
    flex: 0 0 14px;
    width: 14px;
    color: var(--signal);
    opacity: 0;
  }
  .app-item[aria-checked="true"] .app-check { opacity: 1; }

  /* ---- prototype tablist + version spine ---- */
  .prototypes {
    position: relative;
    padding: 14px 0 14px 0;
    overflow-y: auto;
    min-height: 0;
  }

  .tab {
    position: relative;
    display: flex;
    align-items: center;
    width: 100%;
    border: 0;
    background: transparent;
    cursor: pointer;
    text-align: left;
    padding: 13px 18px 13px 0;
    color: var(--text);
    transition: background var(--dur) ease;
  }
  .tab:hover { background: var(--tab-hover-bg); }

  /* active-tab marker: thin Pulse-Green bar at the rail edge */
  .tab[aria-selected="true"] {
    background: var(--tab-active-bg);
    box-shadow: inset 2px 0 0 0 var(--signal);
  }

  .tab:focus-visible {
    outline: 2px solid var(--signal);
    outline-offset: -2px;
  }

  /* dot column — holds the spine line + the version dot */
  .dot-col {
    position: relative;
    flex: 0 0 var(--gutter);
    align-self: stretch;
  }
  /* the spine: a continuous vertical ladder behind the dots */
  .dot-col::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    transform: translateX(-0.5px);
    background: var(--hairline);
  }
  .tab:first-child .dot-col::before { top: 50%; }
  .tab:last-child  .dot-col::before { bottom: 50%; }

  .dot {
    position: absolute;
    left: 50%;
    top: 50%;
    width: var(--dot);
    height: var(--dot);
    margin: calc(var(--dot) / -2);
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.55;
    box-shadow: 0 0 0 4px var(--raised);   /* punch through the spine line */
    transition: background var(--dur) ease, opacity var(--dur) ease, box-shadow var(--dur) ease;
  }
  .tab[aria-selected="true"] .dot {
    background: var(--signal);
    opacity: 1;
    box-shadow: 0 0 0 4px var(--raised), 0 0 0 6px rgba(4, 120, 87, 0.28);
  }

  .tab-body {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .tab-label {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 13.5px;
    letter-spacing: -0.005em;
    color: var(--text);
    word-break: break-word;
  }
  .tab[aria-selected="false"] .tab-label { color: var(--muted); }
  .tab-version {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--muted);
  }

  /* ---- Branding node: a wholly amber rail item, lifted out of the version spine.
     A brand pack isn't a prototype version, so the WHOLE node is amber — label,
     wash, dot, marker — not just an accent, plus its own divider and no ladder
     line. Placed after the base .tab rules so its label colour wins cleanly. */
  .tab--brand {
    background: rgba(201, 154, 46, 0.06);
    border-bottom: 1px solid var(--hairline);
  }
  .tab--brand:hover { background: rgba(201, 154, 46, 0.10); }
  .tab--brand[aria-selected="false"] .tab-label,
  .tab--brand[aria-selected="true"]  .tab-label { color: var(--brand); }
  .tab--brand .tab-version { color: rgba(201, 154, 46, 0.7); }
  .tab--brand .dot { background: var(--brand); opacity: 0.9; }
  .tab--brand .dot-col::before { display: none; }   /* off the version ladder */
  .tab--brand + .tab .dot-col::before { top: 50%; } /* spine now starts at the next tab */
  .tab--brand[aria-selected="true"] {
    background: rgba(201, 154, 46, 0.13);
    box-shadow: inset 2px 0 0 0 var(--brand);
  }
  .tab--brand[aria-selected="true"] .dot {
    background: var(--brand);
    opacity: 1;
    box-shadow: 0 0 0 4px var(--raised), 0 0 0 6px rgba(201, 154, 46, 0.28);
  }
  .tab--brand:focus-visible { outline-color: var(--brand); }

  /* ============================================================= STAGE */
  .stage {
    flex: 1 1 auto;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--ink);
  }

  .meta {
    flex: 0 0 auto;
    background: var(--raised);
    border-bottom: 1px solid var(--hairline);
    padding: 14px 22px 15px;
  }
  .meta-keys {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.4;
  }
  .meta-pair { white-space: nowrap; }
  .meta-k {
    color: var(--muted);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    margin-right: 6px;
  }
  .meta-v { color: var(--text); font-weight: 500; }
  .meta-sep { color: var(--hairline); }
  .meta-desc {
    margin-top: 9px;
    font-family: var(--font-sans);
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--muted);
    max-width: 92ch;
  }

  .frames {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    padding: 20px;
  }
  .frame {
    flex: 1 1 auto;
    min-height: 0;
    display: none;
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--ink);
    animation: frame-in var(--dur) ease both;
  }
  .frame.is-active { display: flex; }
  .frame > iframe {
    flex: 1 1 auto;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  @keyframes frame-in { from { opacity: 0; } to { opacity: 1; } }

  /* ---- viewport toggle (Desktop | Mobile) ---- */
  .meta-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .viewport-toggle {
    flex: 0 0 auto;
    display: inline-flex;
    gap: 2px;
    padding: 2px;
    background: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: 7px;
  }
  .vp-btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: -0.005em;
    padding: 5px 13px;
    border-radius: 5px;
    transition: background var(--dur) ease, color var(--dur) ease, box-shadow var(--dur) ease;
  }
  .vp-btn:hover { color: var(--text); }
  .vp-btn[aria-pressed="true"] {
    background: var(--tab-active-bg);
    color: var(--text);
    box-shadow: inset 0 0 0 1px var(--hairline);
  }
  .vp-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 1px; }

  /* ---- layout toggles (desktop): collapse the rail / info bar to maximise stage ---- */
  .view-toggles {
    flex: 0 0 auto;
    display: inline-flex;
    gap: 2px;
    padding: 2px;
    background: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: 7px;
  }
  .view-btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px 7px;
    border-radius: 5px;
    transition: background var(--dur) ease, color var(--dur) ease;
  }
  .view-btn:hover { color: var(--text); }
  .view-btn svg { width: 15px; height: 15px; display: block; }
  .view-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 1px; }
  .view-btn[aria-pressed="true"] {
    background: var(--tab-active-bg);
    color: var(--text);
    box-shadow: inset 0 0 0 1px var(--hairline);
  }

  /* Collapse behaviour is desktop-only — mobile already drops the bar and drawers
     the rail, so these rules are fenced above the 640px breakpoint to avoid leaking
     a body.*-collapsed class into the mobile drawer's own width/transform. */
  @media (min-width: 641px) {
    .rail { transition: flex-basis .18s ease, width .18s ease; }
    body.rail-collapsed .rail {
      flex-basis: 0;
      width: 0;
      overflow: hidden;
      border-right-color: transparent;
    }
    body.bar-collapsed .meta-keys,
    body.bar-collapsed .meta-desc { display: none; }
    body.bar-collapsed .meta { padding-top: 9px; padding-bottom: 9px; }
  }

  /* mobile viewport: clamp the active frame to phone width, centered on the
     graphite. An iframe is its own viewport, so narrowing it makes each
     prototype's OWN responsive code reflow to mobile — prototypes untouched. */
  .frames.vp-mobile { justify-content: center; }
  .frames.vp-mobile .frame {
    flex: 0 0 min(390px, 100%);
    max-width: 390px;
    margin-inline: auto;
  }

  /* ===================================================== MOBILE CHROME (base) */
  /* New mobile-only nodes are display:none by default, so the desktop layout is
     byte-for-byte untouched. The @media (max-width:640px) block below is the ONLY
     place they are revealed. */
  .topbar,
  .scrim,
  .rail-close,
  .rail-meta { display: none; }

  /* ============================================================= CHANGELOG */
  /* Per-prototype "recent changes" — a reviewer-facing meta layer, never part of
     a prototype. Carries the rail's version-spine motif: changes ride a timeline. */
  .meta-actions {
    flex: 0 0 auto;
    margin-left: auto;   /* pin right regardless of siblings — actions never shift
                            when .meta-keys is hidden on info-bar collapse */
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .changes-btn {
    appearance: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--hairline);
    border-radius: 7px;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: -0.005em;
    padding: 5px 12px;
    transition: color var(--dur) ease, border-color var(--dur) ease;
  }
  .changes-btn[hidden] { display: none; }
  .changes-btn:hover { color: var(--text); border-color: var(--muted); }
  .changes-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 1px; }
  .changes-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.22);
  }
  /* mobile twin of .changes-btn — lives in the rail drawer's config foot
     (.rail-meta), so it only surfaces at phone width where that foot is shown. */
  .rail-changes-btn {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 14px;
    appearance: none; cursor: pointer;
    background: transparent; color: var(--text);
    border: 1px solid var(--hairline); border-radius: var(--radius);
    font-family: var(--font-display); font-weight: 500; font-size: 13px;
    letter-spacing: -0.005em;
    padding: 9px 14px; min-height: 44px;
    transition: border-color var(--dur) ease, background var(--dur) ease;
  }
  .rail-changes-btn[hidden] { display: none; }
  .rail-changes-btn:hover { border-color: var(--muted); background: var(--tab-hover-bg); }
  .rail-changes-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

  .cl-scrim {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(0, 0, 0, 0.5);
    animation: cl-fade var(--dur) ease both;
  }
  .cl-scrim[hidden] { display: none; }
  @keyframes cl-fade { from { opacity: 0; } to { opacity: 1; } }

  .cl-panel {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 41;
    width: min(420px, 100%);
    display: flex; flex-direction: column;
    background: var(--raised);
    border-left: 1px solid var(--hairline);
    box-shadow: -24px 0 60px rgba(0, 0, 0, 0.45);
    animation: cl-slide var(--dur) ease both;
  }
  .cl-panel[hidden] { display: none; }
  @keyframes cl-slide { from { transform: translateX(18px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .cl-head {
    flex: 0 0 auto;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--hairline);
  }
  .cl-h {
    margin: 0;
    font-family: var(--font-display); font-weight: 600; font-size: 16px;
    letter-spacing: -0.01em; color: var(--text); line-height: 1.2;
  }
  .cl-sub {
    margin-top: 5px;
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }
  .cl-close {
    flex: 0 0 auto; appearance: none; cursor: pointer;
    width: 30px; height: 30px; border-radius: 6px;
    background: transparent; border: 1px solid var(--hairline); color: var(--muted);
    font-size: 13px; line-height: 1;
    transition: color var(--dur) ease, border-color var(--dur) ease;
  }
  .cl-close:hover { color: var(--text); border-color: var(--muted); }
  .cl-close:focus-visible { outline: 2px solid var(--signal); outline-offset: 1px; }

  .cl-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 12px 20px 24px; }

  /* entries ride a vertical spine — the rail's dot-on-a-line, carried over */
  .cl-entry { position: relative; padding: 6px 0 20px 26px; }
  .cl-entry:last-child { padding-bottom: 6px; }
  .cl-entry:not(:last-child)::before {
    content: ""; position: absolute; left: 4px; top: 8px; bottom: -6px;
    width: 1px; background: var(--hairline);
  }
  .cl-node {
    position: absolute; left: 0; top: 4px;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 4px var(--raised), 0 0 0 6px rgba(4, 120, 87, 0.25);
  }
  .cl-date {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
    color: var(--muted); margin-bottom: 7px;
  }
  .cl-entry-title {
    margin: 0 0 11px;
    font-family: var(--font-display); font-weight: 600; font-size: 14px;
    letter-spacing: -0.005em; color: var(--text); line-height: 1.3;
  }
  .cl-items { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .cl-item {
    position: relative; padding-left: 16px;
    font-family: var(--font-sans); font-size: 12.5px; line-height: 1.5; color: var(--muted);
  }
  .cl-item::before {
    content: ""; position: absolute; left: 2px; top: 8px;
    width: 4px; height: 4px; border-radius: 50%; background: var(--muted); opacity: 0.7;
  }
  .cl-base {
    margin-top: 13px;
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em;
    color: var(--muted); opacity: 0.75;
  }

  /* mobile: the drawer becomes a bottom sheet */
  @media (max-width: 640px) {
    .cl-panel {
      top: auto; left: 0; right: 0; width: 100%;
      max-height: 82vh;
      border-left: 0; border-top: 1px solid var(--hairline);
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -24px 60px rgba(0, 0, 0, 0.45);
      animation: cl-slide-up var(--dur) ease both;
    }
    @keyframes cl-slide-up { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  }

  /* ============================================================= RESPONSIVE */
  /* At phone width the whole console "config" (app switcher + version tabs +
     meta detail) collapses into a left off-canvas drawer — the rail — opened
     from a slim top bar, so the prototype iframe gets the viewport. The
     Desktop|Mobile toggle is dropped here: you are already mobile. */
  @media (max-width: 640px) {
    body { flex-direction: column; }   /* rail leaves the flow (fixed drawer) */

    /* ---- slim top bar: hamburger + active prototype title ---- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--raised);
      border-bottom: 1px solid var(--hairline);
      padding: 8px 12px;
      padding-top: calc(8px + env(safe-area-inset-top));   /* clear the notch */
    }
    .menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 44px;            /* >=44px tap target */
      height: 44px;
      padding: 0;
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--text);
      cursor: pointer;
    }
    .menu-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }
    .menu-btn svg { width: 18px; height: 18px; }
    .topbar-title {
      min-width: 0;
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.005em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- scrim behind the open drawer (fades, never blocks when closed) ---- */
    .scrim {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0, 0, 0, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur) ease;
    }
    .scrim.open { opacity: 1; pointer-events: auto; }

    /* ---- the rail itself becomes the off-canvas config drawer ---- */
    .rail {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 40;
      width: min(86vw, 320px);
      height: 100%;
      height: 100dvh;        /* honour the mobile URL bar */
      border-right: 1px solid var(--hairline);
      border-bottom: 0;
      transform: translateX(-100%);
      transition: transform var(--dur) ease;
      overflow-y: auto;
    }
    .rail.open {
      transform: translateX(0);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
    }
    .brand { padding: calc(16px + env(safe-area-inset-top)) 18px 14px; }

    /* close (x) button, top-right of the drawer header */
    .rail-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: calc(12px + env(safe-area-inset-top));
      right: 12px;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .rail-close:hover { color: var(--text); background: var(--tab-hover-bg); }
    .rail-close:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }
    .rail-close svg { width: 16px; height: 16px; }

    /* version tabs keep their vertical (desktop) layout inside the drawer —
       the old horizontal top-strip styling is gone entirely. */
    .prototypes { flex: 1 1 auto; }

    /* ---- config detail (version/slug/ticket + desc), pinned to drawer foot ---- */
    .rail-meta {
      display: block;
      margin-top: auto;
      padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--hairline);
    }
    .rail-meta-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 2px 0;
    }
    .rail-meta .meta-desc { max-width: none; }

    /* ---- stage: drop the desktop meta header + toggle; iframe goes full-bleed ---- */
    .meta { display: none; }
    .frames { padding: 0; }
    .frame { border: 0; border-radius: 0; }

    /* neutralise any leftover "Mobile" clamp carried in from desktop toggle state,
       so the iframe is never double-clamped/centred at an already-mobile width */
    .frames.vp-mobile { justify-content: flex-start; }
    .frames.vp-mobile .frame {
      flex: 1 1 auto;
      max-width: none;
      margin-inline: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>

      <button type="button" class="cl-close" id="cl-close" aria-label="Close recent changes">✕</button>
    </header>
    <div class="cl-body" id="cl-body"></div>
  </aside>

<script>
  'use strict';

  // Single source of truth — app-keyed so a second app is a clean data addition.
  // Each app carries its label (the rail-top app node) + its ordered prototypes.
  // Prototype order = version order = tab order. Default active = first (baseline).
  var APPS = {
    circlists: {
      label: 'Circlists',
      // Rail-top lockup: mark + wordmark, via <use> refs to the brand symbol defs.
      // An app without a `logo` falls back to its text `label`.
      logo: '<svg class="lockup-mark" viewBox="0 0 48 48" aria-hidden="true"><use href="#s-mark"/></svg>' +
            '<svg class="lockup-wm" viewBox="0 0 8176.42 2212.05" aria-hidden="true"><use href="#s-wm"/></svg>',
      prototypes: [
        {
          slug: 'brand',
          label: 'Branding',
          version: '—',
          ticket: '—',
          html: 'circlists-brand.html',
          kind: 'brand',
          desc: 'The Circlists brand pack — mark, wordmark, colour, and type on one reference sheet. Not a prototype version: a living snapshot whose source moves and updates over time, so treat this as a point-in-time copy, not the canonical home.'
        },
        {
          slug: 'baseline',
          version: 'v0.2.1',
          ticket: 'LM-239',
          desc: 'The baseline prototype in the project spec space — the current accepted alpha UI the two deltas build on (Claude Design v0.2.1, retrieved 2026-06-11).'
        },
        {
          slug: 'lm-298-ux-consolidation',
          version: 'v0.2.2',
          ticket: 'LM-298',
          desc: 'UX consolidation: account control to rail foot, top bar becomes the space header, one unified empty state, create→fund gains exit/back controls.'
        },
        {
          slug: 'lm-270-mobile-width',
          version: 'v0.2.3',
          ticket: 'LM-270',
          desc: 'Mobile-width pass: one shared content width, single rail toggle, slide+scrim motion, ≥44px tap targets, ≥16px inputs (kills iOS focus zoom).'
        },
        {
          slug: 'lm-367-369-champion-self-serve',
          version: 'v0.3.0',
          ticket: 'LM-367 · LM-369',
          desc: 'The working prototype where in-flight v1-delta changes land on the current alpha line. Adds self-serve account & space management: account-scoped change-email (LM-367); champion-gated space rename and member removal (LM-369).',
          changelog: [
            {
              date: '2026-06-28',
              title: 'Self-serve account & space management',
              items: [
                'Change email — verify the new address by code before it switches (Account settings).',
                'Rename a space — inline, champion-only, on the Space settings surface.',
                'Remove a member — champion-only, via a per-member menu; removed members keep their real name on links they added (former-member attribution is reserved for account deletion).'
              ],
              base: 'Built on the current alpha line.'
            },
            {
              date: '2026-07-05',
              title: 'Member email visibility gated to owner/champion',
              items: [
                'Members surface — a member row shows its email address only for the viewer\'s own row, or when the viewer is champion; previously every member\'s email was visible to every viewer regardless of role (PII fix, flagged via LatentMagic/monorepo#395).'
              ],
              base: 'Built on the LM-367/LM-369 self-serve line.'
            }
          ]
        },
        {
          slug: 'biz-63-loop-closure',
          version: 'exploration',
          ticket: 'BIZ-63',
          desc: 'Loop-closure reaction-reveal at mark-as-read — ten switchable variants across two rounds to try side by side (Round 1 signal: Map · Nine Glyphs · Lexicon · Pulse · Gathering; Round 2 tactile: Stick · Trace · Dial · Plain Pair · Swell), swapped from the in-prototype variant switcher. Active stays calm; the circle\'s earlier reactions reveal after your own mark-as-read, then live on the Read card.',
          changelog: [
            {
              date: '2026-07-06',
              title: 'Tenth variant — The Swell (emoji × analogue stick)',
              items: [
                'The Swell — fuses Nine Glyphs\' emoji palette with The Stick\'s analogue drag: pull toward one of nine glyphs, pull distance sets how hard it lands, surfaced via radial distance and glyph size (no transparency or gradients), plus a soft accent halo on your own glyph. Names-toggle-aware. Current favorite under exploration for its tactile feel.',
                'On this variant only, mark-as-read skips the confirm dialog and goes straight into the analogue-stick reaction; every other variant\'s confirm dialog is unchanged.'
              ],
              base: 'Built on the nine-variant round-1/round-2 exploration line.'
            }
          ]
        },
        {
          slug: 'next',
          version: 'v1',
          ticket: '—',
          html: 'circlists.html',
          desc: 'The Circlists working line — the current prototype ahead of product. Changes accrete here rather than into new ticket tabs. This build lands the LatentPulse → Circlists rebrand (concentric-circle mark, "space" → "circle" throughout), The Swell loop-closure reaction (finish a link and you leave the circle a glyph and how hard it landed; the circle\'s responses re-open on the Read card), £3 introductory circle pricing, and a support-contact link in settings. Champion self-serve and change-email carry in from the shipped line.',
          changelog: [
            {
              date: '2026-07-08',
              title: 'The Swell — tuned to five glyphs, legible crowds',
              items: [
                'Reaction vocabulary cut from nine to five (❤️ 🔥 👍 💡 😂). The radial dial, snap, drag, and keyboard input all derive from the vocabulary size now, so the mechanism reshaped around five with no hardcoded angles left.',
                'Clustering solved: same-emoji reactions group in one region (that is the meaning), fanned by a constant gap per person so a crowd reads as a huddle; depth still drives distance from centre; a collision pass measures real gaps and pushes apart anything stacked — auto-placed or dragged — so no reaction hides behind another.',
                'Dropped the white sticker outline — it conflicted with your own reaction\'s green halo and the collision pass made it redundant.',
                'Seed data rebuilt to the five glyphs, with same-emoji clusters staged across the Backend Pod so the crowded case shows by default.'
              ],
              base: 'Refines The Swell (2026-07-07) toward the shippable shape.'
            },
            {
              date: '2026-07-08',
              title: 'Support contact in settings',
              items: [
                'A quiet support mailto (support@circlists.com) at the foot of Account settings and circle settings, driven by the shared operator-email constant that also feeds the dormant-circle contact links.'
              ],
              base: 'Built on the Circlists line.'
            },
            {
              date: '2026-07-08',
              title: 'Pricing — £3 introductory rate',
              items: [
                'Circle funding drops from £9 to £3 a month, carried from the single price constant across every surface.',
                '"Introductory rate" framing on the new-circle funding page — a light signal the price may rise later, not a locked-in discount; label only, not repeated on re-fund or billing.'
              ],
              base: 'Built on the Circlists line.'
            },
            {
              date: '2026-07-07',
              title: 'Loop closure — The Swell reaction',
              items: [
                'The mark-as-read confirm modal is replaced by The Swell: finishing a link leaves the circle a reaction — a glyph and how hard it landed — and anyone can later re-open how the whole circle responded. Reading closes a loop instead of just filing the item away.',
                'Communal reactions, individual read-state: the reaction lives on the Read-tab card for everyone; leaving one still only marks the item read in your own queue.',
                'Rough by design, to be tuned over time.'
              ],
              base: 'Carries the BIZ-63 loop-closure exploration forward; Variant 10 (The Swell) picked as the v1 mechanism.'
            },
            {
              date: '2026-07-07',
              title: 'Rebrand — LatentPulse → Circlists',
              items: [
                'Product renamed LatentPulse → Circlists; the old name is retired. New brand mark: a concentric circle (green halo → white ring → green disc) replacing the "LP" box.',
                'Group terminology changed in all user-facing copy: "space" → "circle" (Circles rail, New circle, Circle settings, funding, empty and dormant states, dialogs). Internal code identifiers unchanged.',
                'Accent green #047857 and the rest of the visual system carried over unchanged; entry file is now circlists.html.'
              ],
              base: 'First Circlists-branded build; supersedes the LatentPulse working line.'
            }
          ]
        }
      ]
    }
  };

  // Active app + its prototypes are owned by renderApp() — re-runnable so the
  // app switcher can repoint to another app (data-driven; one app today).
  var ACTIVE_APP, APP, PROTOTYPES;

  function srcFor(app, slug, html) {
    return 'app/' + app + '/' + slug + '/' + (html || 'latentpulse.html');
  }

  var tablist = document.querySelector('.prototypes');
  var framesEl = document.getElementById('frames');
  var appNameEl = document.getElementById('app-name');
  var meta = {
    version: document.getElementById('m-version'),
    slug: document.getElementById('m-slug'),
    ticket: document.getElementById('m-ticket'),
    desc: document.getElementById('m-desc')
  };
  // Mobile chrome: top-bar title + the drawer-foot meta mirror (fresh ids, so no
  // getElementById collision with the desktop meta nodes above).
  var topbarTitle = document.getElementById('topbar-title');
  var railMeta = {
    version: document.getElementById('rm-version'),
    slug: document.getElementById('rm-slug'),
    ticket: document.getElementById('rm-ticket'),
    desc: document.getElementById('rm-desc')
  };

  var tabs = [];
  var frames = [];
  var activeIndex = 0;
  var focusIndex = 0;

  // Build (or rebuild) the version tabs + frames for the active app's prototypes.
  function buildPrototypes() {
    tablist.innerHTML = '';
    framesEl.innerHTML = '';
    tabs.length = 0;
    frames.length = 0;

    PROTOTYPES.forEach(function (spec, i) {
      var tab = document.createElement('button');
      tab.className = 'tab' + (spec.kind === 'brand' ? ' tab--brand' : '');
      tab.type = 'button';
      tab.id = 'tab-' + spec.slug;
      tab.setAttribute('role', 'tab');
      tab.setAttribute('aria-controls', 'panel-' + spec.slug);
      tab.setAttribute('aria-selected', 'false');
      tab.tabIndex = -1;
      tab.innerHTML =
        '<span class="dot-col" aria-hidden="true"><span class="dot"></span></span>' +
        '<span class="tab-body">' +
          '<span class="tab-label">' + (spec.label || spec.slug) + '</span>' +
          '<span class="tab-version">' + spec.version + '</span>' +
        '</span>';

      // pointer select: load + select, then close the drawer to reveal it.
      // (keyboard activation is handled in the tablist keydown below.)
      tab.addEventListener('click', function () { activate(i, false); closeDrawer(true); });
      tab.addEventListener('focus', function () { focusIndex = i; });
      tablist.appendChild(tab);
      tabs.push(tab);

      var frame = document.createElement('div');
      frame.className = 'frame';
      frame.id = 'panel-' + spec.slug;
      frame.setAttribute('role', 'tabpanel');
      frame.setAttribute('aria-labelledby', tab.id);

      var iframe = document.createElement('iframe');
      iframe.title = spec.slug + ' (' + spec.version + ')';
      iframe.loading = 'lazy';
      // No sandbox attribute: trusted local content, and a bare sandbox would
      // break the same-origin XHR babel-standalone uses to fetch app/*.jsx.
      frame.appendChild(iframe);
      framesEl.appendChild(frame);
      frames.push({ wrap: frame, iframe: iframe, loaded: false });
    });
  }

  function activate(i, moveFocus) {
    activeIndex = i;
    PROTOTYPES.forEach(function (spec, j) {
      var selected = j === i;
      tabs[j].setAttribute('aria-selected', selected ? 'true' : 'false');
      tabs[j].tabIndex = selected ? 0 : -1;
      frames[j].wrap.classList.toggle('is-active', selected);
      if (selected && !frames[j].loaded) {
        frames[j].iframe.src = srcFor(ACTIVE_APP, spec.slug, spec.html);   // lazy: set src on first activation
        frames[j].loaded = true;
      }
    });
    var spec = PROTOTYPES[i];
    meta.version.textContent = spec.version;
    meta.slug.textContent = spec.slug;
    meta.ticket.textContent = spec.ticket;
    meta.desc.textContent = spec.desc;
    // mirror into the mobile chrome
    topbarTitle.textContent = spec.slug + ' · ' + spec.version;
    railMeta.version.textContent = spec.version;
    railMeta.slug.textContent = spec.slug;
    railMeta.ticket.textContent = spec.ticket;
    railMeta.desc.textContent = spec.desc;
    syncChangelog(spec);
    // keep the URL shareable: reflect the active slug in the hash (replaceState =
    // no history spam, and no hashchange event so this never loops back on us).
    var wantHash = '#' + spec.slug;
    if (location.hash !== wantHash) history.replaceState(null, '', wantHash);
    if (moveFocus) tabs[i].focus();
  }

  // Render an app: set it active, label the rail node, (re)build its prototypes.
  // Default landing skips reference nodes (the brand pack) so the console opens
  // on the working line, not the brand sheet — even though brand sits top-of-rail.
  function defaultIndex() {
    for (var i = 0; i < PROTOTYPES.length; i++) {
      if (PROTOTYPES[i].kind !== 'brand') return i;
    }
    return 0;
  }

  function renderApp(appKey) {
    ACTIVE_APP = appKey;
    APP = APPS[appKey];
    PROTOTYPES = APP.prototypes;
    if (APP.logo) { appNameEl.innerHTML = APP.logo; appNameEl.setAttribute('aria-label', APP.label); }
    else { appNameEl.textContent = APP.label; appNameEl.removeAttribute('aria-label'); }
    document.title = APP.label + ' · Prototype Console';
    var start = defaultIndex();
    activeIndex = start;
    focusIndex = start;
    buildPrototypes();
    activate(start, false);
    updateAppMenu();
  }

  // Keyboard: arrows move focus among version tabs (roving tabindex); Enter/Space activates.
  function moveFocus(next) {
    var n = tabs.length;
    focusIndex = (next + n) % n;
    tabs.forEach(function (t, j) { t.tabIndex = j === focusIndex ? 0 : -1; });
    tabs[focusIndex].focus();
  }

  tablist.addEventListener('keydown', function (e) {
    switch (e.key) {
      case 'ArrowDown':
      case 'ArrowRight':
        e.preventDefault();
        moveFocus(focusIndex + 1);
        break;
      case 'ArrowUp':
      case 'ArrowLeft':
        e.preventDefault();
        moveFocus(focusIndex - 1);
        break;
      case 'Home':
        e.preventDefault();
        moveFocus(0);
        break;
      case 'End':
        e.preventDefault();
        moveFocus(tabs.length - 1);
        break;
      case 'Enter':
      case ' ':
      case 'Spacebar':
        e.preventDefault();
        activate(focusIndex, true);
        closeDrawer(true);   /* on mobile, reveal the chosen prototype */
        break;
    }
  });

  // ---- app switcher: the rail-top app node opens a menu of apps ----
  var appSwitch = document.getElementById('app-switch');
  var appMenu = document.getElementById('app-menu');

  function buildAppMenu() {
    appMenu.innerHTML = '';
    Object.keys(APPS).forEach(function (key) {
      var li = document.createElement('li');
      li.setAttribute('role', 'none');
      var item = document.createElement('button');
      item.type = 'button';
      item.className = 'app-item';
      item.setAttribute('role', 'menuitemradio');
      item.setAttribute('aria-checked', 'false');
      item.dataset.app = key;
      item.innerHTML =
        '<span class="app-check" aria-hidden="true">✓</span>' +
        '<span>' + APPS[key].label + '</span>';
      item.addEventListener('click', function () {
        closeAppMenu();
        if (key !== ACTIVE_APP) renderApp(key);
        appSwitch.focus();
      });
      li.appendChild(item);
      appMenu.appendChild(li);
    });
  }

  function updateAppMenu() {
    appMenu.querySelectorAll('.app-item').forEach(function (it) {
      it.setAttribute('aria-checked', it.dataset.app === ACTIVE_APP ? 'true' : 'false');
    });
  }

  function onOutside(e) {
    if (e.target !== appSwitch && !appSwitch.contains(e.target) && !appMenu.contains(e.target)) {
      closeAppMenu();
    }
  }
  function onMenuKey(e) {
    if (e.key === 'Escape') { closeAppMenu(); appSwitch.focus(); }
  }
  function openAppMenu() {
    appMenu.hidden = false;
    appSwitch.setAttribute('aria-expanded', 'true');
    document.addEventListener('mousedown', onOutside, true);
    document.addEventListener('keydown', onMenuKey, true);
  }
  function closeAppMenu() {
    appMenu.hidden = true;
    appSwitch.setAttribute('aria-expanded', 'false');
    document.removeEventListener('mousedown', onOutside, true);
    document.removeEventListener('keydown', onMenuKey, true);
  }
  appSwitch.addEventListener('click', function () {
    if (appMenu.hidden) openAppMenu(); else closeAppMenu();
  });

  // Viewport toggle: Desktop fills the stage; Mobile clamps the active frame to
  // phone width so each prototype's own responsive layout reflows. Global state —
  // persists across tab switches.
  var vpDesktop = document.getElementById('vp-desktop');
  var vpMobile = document.getElementById('vp-mobile');
  function setViewport(isMobile) {
    framesEl.classList.toggle('vp-mobile', isMobile);
    vpMobile.setAttribute('aria-pressed', isMobile ? 'true' : 'false');
    vpDesktop.setAttribute('aria-pressed', isMobile ? 'false' : 'true');
  }
  vpDesktop.addEventListener('click', function () { setViewport(false); });
  vpMobile.addEventListener('click', function () { setViewport(true); });

  // ---- layout toggles: collapse the rail / info bar to hand the stage more space.
  // Both open by default; aria-pressed=true means the panel is shown. Desktop-only
  // (the buttons live in .meta, which is display:none at mobile width). ----
  var toggleRail = document.getElementById('toggle-rail');
  var toggleBar = document.getElementById('toggle-bar');
  function setPanel(btn, cls, show, titleShown, titleHidden) {
    document.body.classList.toggle(cls, !show);
    btn.setAttribute('aria-pressed', show ? 'true' : 'false');
    btn.title = show ? titleShown : titleHidden;
  }
  toggleRail.addEventListener('click', function () {
    setPanel(toggleRail, 'rail-collapsed', document.body.classList.contains('rail-collapsed'), 'Hide sidebar', 'Show sidebar');
  });
  toggleBar.addEventListener('click', function () {
    setPanel(toggleBar, 'bar-collapsed', document.body.classList.contains('bar-collapsed'), 'Collapse info bar', 'Show info bar');
  });

  // ---- mobile drawer: the rail slides out to expose the console config ----
  // Mirrors the app-switcher's open/close shape. Only meaningful at mobile width
  // (the drawer styles live in the media query); every handler is a safe no-op
  // on desktop because .open never produces a transform there.
  var rail = document.getElementById('rail');
  var menuBtn = document.getElementById('menu-btn');
  var railClose = document.getElementById('rail-close');
  var scrim = document.getElementById('scrim');

  function onDrawerKey(e) {
    if (e.key !== 'Escape') return;
    if (!appMenu.hidden) return;   // app-switcher menu owns Escape while it's open
    e.preventDefault();
    closeDrawer(true);
  }
  function openDrawer() {
    rail.classList.add('open');
    scrim.classList.add('open');
    menuBtn.setAttribute('aria-expanded', 'true');
    document.addEventListener('keydown', onDrawerKey, true);
    railClose.focus();
  }
  function closeDrawer(restoreFocus) {
    if (!rail.classList.contains('open')) return;   // no-op when already closed / on desktop
    closeAppMenu();                                  // never leave a nested menu orphaned
    rail.classList.remove('open');
    scrim.classList.remove('open');
    menuBtn.setAttribute('aria-expanded', 'false');
    document.removeEventListener('keydown', onDrawerKey, true);
    if (restoreFocus) menuBtn.focus();
  }
  menuBtn.addEventListener('click', function () {
    if (rail.classList.contains('open')) closeDrawer(true); else openDrawer();
  });
  railClose.addEventListener('click', function () { closeDrawer(true); });
  scrim.addEventListener('click', function () { closeDrawer(false); });

  // ---- changelog: per-prototype "recent changes" drawer ----
  // Shown only for prototypes that declare a `changelog`. Entries ride the same
  // version-spine motif as the rail. Reviewer-facing meta layer; never product.
  var changesBtn = document.getElementById('changes-btn');
  var clScrim = document.getElementById('cl-scrim');
  var clPanel = document.getElementById('cl-panel');
  var clBody = document.getElementById('cl-body');
  var clSub = document.getElementById('cl-sub');
  var clClose = document.getElementById('cl-close');
  var changesBtnM = document.getElementById('changes-btn-m');   // mobile twin (rail-meta foot)
  var clInvoker = null;

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  // Reflect the active prototype's changelog onto the button + drawer body.
  function syncChangelog(spec) {
    var log = (spec && spec.changelog) || [];
    changesBtn.hidden = log.length === 0;
    changesBtnM.hidden = log.length === 0;
    if (log.length === 0) { closeChangelog(); return; }
    clSub.textContent = spec.slug;
    clBody.innerHTML = log.map(function (e) {
      var items = (e.items || []).map(function (it) {
        return '<li class="cl-item">' + esc(it) + '</li>';
      }).join('');
      return '<article class="cl-entry">' +
        '<span class="cl-node" aria-hidden="true"></span>' +
        (e.date ? '<div class="cl-date">' + esc(e.date) + '</div>' : '') +
        '<h3 class="cl-entry-title">' + esc(e.title || '') + '</h3>' +
        (items ? '<ul class="cl-items">' + items + '</ul>' : '') +
        (e.base ? '<div class="cl-base">' + esc(e.base) + '</div>' : '') +
        '</article>';
    }).join('');
  }

  function onClKey(e) { if (e.key === 'Escape') closeChangelog(); }
  function openChangelog() {
    clInvoker = document.activeElement;
    clScrim.hidden = false;
    clPanel.hidden = false;
    document.addEventListener('keydown', onClKey, true);
    clClose.focus();
  }
  function closeChangelog() {
    if (clPanel.hidden) return;
    clPanel.hidden = true;
    clScrim.hidden = true;
    document.removeEventListener('keydown', onClKey, true);
    if (clInvoker && clInvoker.focus) clInvoker.focus();
  }
  changesBtn.addEventListener('click', openChangelog);
  // mobile: close the config drawer first, then open the changelog over the stage
  changesBtnM.addEventListener('click', function () { closeDrawer(false); openChangelog(); });
  clClose.addEventListener('click', closeChangelog);
  clScrim.addEventListener('click', closeChangelog);

  // ---- deep-linking ----
  // A prototype is shareable at #<slug>. activate() keeps the hash in sync; on
  // load (and on back/forward) we resolve an incoming hash to its app + tab.
  function findBySlug(slug) {
    var keys = Object.keys(APPS);
    for (var k = 0; k < keys.length; k++) {
      var protos = APPS[keys[k]].prototypes;
      for (var i = 0; i < protos.length; i++) {
        if (protos[i].slug === slug) return { appKey: keys[k], index: i };
      }
    }
    return null;
  }
  function slugFromHash() {
    try { return decodeURIComponent((location.hash || '').replace(/^#/, '')).trim(); }
    catch (e) { return ''; }
  }
  function selectSlug(slug) {
    var t = findBySlug(slug);
    if (!t) return false;                       // unknown slug → leave default
    if (t.appKey !== ACTIVE_APP) renderApp(t.appKey);
    activate(t.index, false);
    return true;
  }

  // ---- boot ----
  buildAppMenu();
  var bootSlug = slugFromHash();                 // capture before renderApp rewrites the hash
  renderApp(Object.keys(APPS)[0]);
  if (bootSlug) selectSlug(bootSlug);            // honour a shared #slug link
  window.addEventListener('hashchange', function () { selectSlug(slugFromHash()); });
</script>
</body>
</html>
