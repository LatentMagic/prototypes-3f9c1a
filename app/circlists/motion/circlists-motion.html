<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Circlists motion — live preview</title>
<style>
  body{margin:0;font:15px/1.5 -apple-system,system-ui,sans-serif}
  .panel{padding:32px 36px}
  .cream{background:#FAFAF7;color:#0A0A0A}
  .ink{background:#0A0A0A;color:#FAFAF7}
  h1{font-size:15px;letter-spacing:.05em;text-transform:uppercase;opacity:.55;margin:0 0 20px}
  .row{display:flex;align-items:flex-end;gap:44px;flex-wrap:wrap;margin-bottom:8px}
  .slot{display:flex;flex-direction:column;align-items:center;gap:8px}
  .slot .px{font:12px ui-monospace,monospace;opacity:.55}
  img{display:block}
  .ctx{display:flex;align-items:center;gap:10px;margin-top:26px;font:14px ui-monospace,monospace;opacity:.8}
  .live-demo-triad{white-space:nowrap}
  .live-demo-triad img{display:inline-block}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:8px;
       background:#047857;color:#fff;font:600 14px/1 system-ui;border:0}
  .note{margin-top:22px;font-size:13px;opacity:.6;max-width:60ch}
</style></head>
<body>
<div class="panel cream">
  <h1>Cream ground</h1>
  <div class="row">
    <div class="slot"><img src="circlists-pulse.svg" width="40" height="40"><span class="px">pulse · 40</span></div>
    <div class="slot"><img src="circlists-spinner.svg" width="100" height="100"><span class="px">spinner · 100</span></div>
    <div class="slot"><img src="circlists-micro.svg" width="10" height="10"><span class="px">micro · 10</span></div>
  </div>
  <div class="ctx">
    <button class="btn"><img src="circlists-spinner.svg" width="16" height="16"> Loading…</button>
  </div>
  <p class="note">Turn on “Reduce motion” in macOS System Settings → Accessibility → Display, then reload: all three should freeze to the plain static mark (the spinner swaps its arc for a full halo).</p>
</div>
</body></html>
