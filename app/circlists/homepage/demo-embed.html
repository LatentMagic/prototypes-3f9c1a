<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<base href="uploads/homepage-demo/" />
<title>Circlists — embedded demo</title>
<link rel="icon" href="brand/assets/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="brand/assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="brand/assets/favicon-16.png" />
<link rel="apple-touch-icon" href="brand/assets/apple-touch-icon.png" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="swell.css" />
<style>
  * { box-sizing: border-box; }
  :root { --circ-vh: 100vh; }
  html, body { margin: 0; padding: 0; background: var(--color-canvas); color: var(--color-fg-1); }
  body { min-height: 100vh; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* ---- spinner ---- */
  .circ-spin {
    display: inline-block; border-style: solid; border-width: 2px;
    border-radius: 50%; animation: circ-spin 700ms linear infinite; flex-shrink: 0;
  }
  @keyframes circ-spin { to { transform: rotate(360deg); } }
  @keyframes circ-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes circ-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes circ-slide-right { from { transform: translateX(-100%); } to { transform: translateX(0); } }

  /* ---- focus rings: first-class ---- */
  button:focus-visible, a:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: var(--ring-width) solid var(--color-accent);
    outline-offset: var(--ring-offset);
  }
  input:focus-visible {
    outline-offset: 0; border-color: var(--color-accent) !important;
  }

  /* ---- button hover/press (4% / 8% darken on accent) ---- */
  .circ-btn-primary:hover:not(:disabled) { background: var(--color-accent-hover) !important; }
  .circ-btn-primary:active:not(:disabled) { background: var(--color-accent-press) !important; }
  .circ-btn-secondary:hover:not(:disabled) { background: var(--color-surface-sunken) !important; }
  .circ-btn-secondary:active:not(:disabled) { background: #E8E8E5 !important; }
  .circ-btn-destructive:hover:not(:disabled) { background: var(--color-destructive-hover) !important; }
  .circ-btn-destructive:active:not(:disabled) { background: var(--color-destructive-press) !important; }
  .circ-btn-tertiary:hover { text-decoration: underline; }

  /* ---- card actions: quiet, recessive ---- */
  .circ-cardaction {
    background: transparent; border: 0; cursor: pointer; border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 10px; min-height: 44px;
    font-family: var(--font-sans); font-weight: 500; font-size: 13px; color: var(--color-fg-2);
    transition: background var(--duration-base), color var(--duration-base);
  }
  .circ-cardaction:hover { background: var(--color-surface-sunken); color: var(--color-fg-1); }
  .circ-cardaction-icon { padding: 8px; min-width: 44px; justify-content: center; }
  .circ-url:hover { text-decoration: underline !important; text-decoration-color: var(--color-fg-3) !important; text-underline-offset: 3px; }

  /* ---- menus / links ---- */
  .circ-menuitem:hover { background: var(--color-surface-sunken); }
  .circ-topaction:hover { background: var(--color-surface-sunken); }
  .circ-topaction:hover { color: var(--color-fg-1); }
  .circ-railacct:hover { background: var(--color-surface); }
  .circ-textlink:hover { text-decoration: underline; text-underline-offset: 2px; }

  /* ---- scenario launcher (prototype aid) ---- */
  .circ-launcher-wrap { position: fixed; right: 16px; bottom: 16px; z-index: 300; }
  .circ-launcher-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--color-fg-1); color: #fff; border: 0; cursor: pointer;
    padding: 9px 14px; border-radius: var(--radius-pill);
    font-family: var(--font-sans); font-weight: 600; font-size: 13px;
    box-shadow: var(--shadow-overlay);
  }
  .circ-launcher-panel {
    position: absolute; bottom: calc(100% + 8px); right: 0;
    width: 248px; background: var(--color-surface);
    border: 1px solid var(--color-border-1); border-radius: var(--radius-md);
    box-shadow: var(--shadow-overlay); padding: 6px;
    max-height: min(72vh, 560px); overflow-y: auto;
  }
  .circ-launcher-head {
    font-family: var(--font-mono); font-weight: 500; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-fg-3);
    padding: 8px 12px 6px;
  }
  .circ-launcher-item {
    display: block; width: 100%; text-align: left; background: transparent; border: 0; cursor: pointer;
    padding: 9px 12px; border-radius: var(--radius-sm);
    font-family: var(--font-sans); font-weight: 500; font-size: 13.5px; color: var(--color-fg-1);
  }
  .circ-launcher-item:hover { background: var(--color-surface-sunken); }
  .circ-launcher-sep { height: 1px; background: var(--color-border-2); margin: 6px 8px; }

  /* ---- mobile phone frame (forced-mobile posture) ---- */
  .circ-stage {
    min-height: 100vh; width: 100%;
    background: #1c1c1a;
    background-image: radial-gradient(circle at 50% 0%, #2a2a27 0%, #161614 70%);
    display: flex; align-items: center; justify-content: center; padding: 24px 16px;
  }
  .circ-phone {
    width: 402px; max-width: 100%;
    height: min(872px, calc(100vh - 48px));
    background: #050505; border-radius: 52px; padding: 11px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 2px #2c2c2c, inset 0 0 0 2px #000;
  }
  .circ-phone-screen {
    position: relative; width: 100%; height: 100%;
    border-radius: 42px; overflow: hidden;
    background: var(--color-canvas);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    transform: translateZ(0); /* containing block for position:fixed children */
    --circ-vh: 100%;
  }
  .circ-phone-screen::-webkit-scrollbar { width: 0; height: 0; }

  /* ---- entrance animations ----
     Overlays rest at their visible end-state with NO entrance keyframe, so they
     render correctly under prefers-reduced-motion AND under capture tools that
     freeze CSS animations at frame 0. Motion lives in transitions (FAB, tabs,
     buttons) which reveal from a real prior value and never hide content. */

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script>
  /* Embed seam owned by the SITE — the app's own index.html stays untouched.
     The parent page passes ?layout= based on the real device width, so the app
     shows its desktop UI on desktop and its mobile UI on phones, regardless of
     the iframe's own (smaller) viewport width. */
  (function () {
    var layout = new URLSearchParams(location.search).get('layout') || 'auto';
    window.CIRC_TWEAK_DEFAULTS = { accent: '#047857', layout: layout };
    /* Gate mode ON — as in the app's standalone demo. This is what wires the
       account-gate triggers to the sign-up overlay; without it those
       interactions are dead (onAccountGate resolves to null). */
    window.CIRC_FORCE_GATE = true;
  })();
</script>
<script src="app.js"></script>
</body>
</html>
